name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio httpx2
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=. --cov-report=xml --cov-report=term-missing
    
    - name: Upload coverage to Codecov
      if: matrix.python-version == '3.11'
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 釘住 black/isort 版本，避免 CI 裝到較新版本產生格式歧異而讓 --check 失敗
        pip install flake8 black==26.5.1 isort==8.0.1 mypy
    
    - name: Run linting
      run: |
        # Check code style
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        
        # Check formatting
        black --check .
        
        # Check imports
        isort --check-only .
    
    - name: Run type checking
      run: |
        mypy . --ignore-missing-imports || true

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install bandit pip-audit

    - name: Run security checks
      run: |
        # 靜態程式碼資安掃描（中高嚴重度＋高信心才視為失敗）
        bandit -r . -ll -ii

    - name: Run dependency audit
      run: |
        # 相依套件漏洞掃描（非阻斷：新披露的 CVE 不應讓 CI 隨機轉紅）。
        # 原本的 `safety check` 已棄用且需連線登入 Safety 平台，改用 pip-audit。
        pip-audit || true

  # 註：原本的 build（python -m build 打包 wheel）與 deploy（twine upload 到 PyPI）
  # 兩個 job 已移除——本專案是應用程式而非要發佈到 PyPI 的套件，該流程並不適用；
  # 且 build 使用了已被 GitHub 停用的 actions/upload-artifact@v3 會自動失敗。
