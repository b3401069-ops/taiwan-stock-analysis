[pytest]
# 測試發現
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 測試選項
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# 標記定義
markers =
    slow: 標記慢速測試
    integration: 整合測試
    unit: 單元測試
    api: API 測試
    cli: CLI 測試
    screener: 選股測試
    backtest: 回測測試
    notification: 通知測試
    rotation: 輪動測試

# 日誌設定
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 覆蓋率設定
# 要使用覆蓋率，請執行: pytest --cov=. --cov-report=html
